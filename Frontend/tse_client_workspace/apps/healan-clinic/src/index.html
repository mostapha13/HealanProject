<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>هیلان — سامانه مدیریت کلینیک</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.png" />
    <script>
      (function () {
        function isNoise(v) {
          var t = v && v.message ? String(v.message) + String(v.stack || '') : String(v || '');
          return /metamask|nkbihfbeogaeaoehlefnkodbefgpgknn|inpage\.js|Failed to connect to MetaMask|chrome-extension:\/\//i.test(t);
        }
        function block(e) {
          if (isNoise(e.message) || isNoise(e.error) || isNoise(e.reason) || isNoise(e.filename)) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        }
        window.addEventListener('error', block, true);
        window.addEventListener('unhandledrejection', block, true);
        window.addEventListener('error', block, false);
        window.addEventListener('unhandledrejection', block, false);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
