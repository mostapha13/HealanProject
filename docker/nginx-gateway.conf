upstream healan_clinic_upstream {
  server healan-clinic:80;
}

upstream healan_portal_upstream {
  server healan-portal:80;
}

upstream login_upstream {
  server healan-login:80;
}

upstream api_gateway_upstream {
  server api-gateway:80;
}

server {
  listen 80;
  server_name clinic.localhost clinic.*;

  location / {
    proxy_pass http://healan_clinic_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /Healan/ {
    proxy_pass http://api_gateway_upstream/Healan/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /UserManager/ {
    proxy_pass http://api_gateway_upstream/UserManager/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /File/ {
    proxy_pass http://api_gateway_upstream/File/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;
  }
}

server {
  listen 80;
  server_name portal.localhost portal.*;

  location / {
    proxy_pass http://healan_portal_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /Healan/ {
    proxy_pass http://api_gateway_upstream/Healan/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /File/ {
    proxy_pass http://api_gateway_upstream/File/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name auth.localhost auth.*;

  location / {
    proxy_pass http://login_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /UserManager/ {
    proxy_pass http://api_gateway_upstream/UserManager/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80 default_server;
  server_name _;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location / {
    return 302 http://portal.localhost$request_uri;
  }
}
