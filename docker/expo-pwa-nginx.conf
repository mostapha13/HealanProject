server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  charset utf-8;
  index index.html;
  absolute_redirect off;
  port_in_redirect off;

  # Gateway strips /mobile/ before proxying here — serve as a normal SPA root.
  location = /sw.js {
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/mobile/";
    try_files /sw.js =404;
  }

  location /_expo/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
