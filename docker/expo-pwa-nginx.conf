server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  charset utf-8;
  index index.html;

  location = /mobile {
    return 302 /mobile/;
  }

  # Strip /mobile prefix; SPA fallback to index.html
  location /mobile/ {
    rewrite ^/mobile/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location /_expo/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/mobile/";
    try_files /sw.js =404;
  }

  location / {
    return 302 /mobile/;
  }
}
