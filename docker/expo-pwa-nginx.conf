server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  charset utf-8;
  absolute_redirect off;
  port_in_redirect off;

  # Exact path without trailing slash
  location = /mobile {
    return 302 /mobile/;
  }

  # Gateway forwards /mobile/... — strip prefix, never bounce back to /mobile/
  location ^~ /mobile/ {
    rewrite ^/mobile/?(.*)$ /$1 break;
    # No $uri/ — avoids index → /index.html → wrong location redirect loops
    try_files $uri @pwa_index;
  }

  # Also OK if gateway strips /mobile and proxies /
  location / {
    try_files $uri @pwa_index;
  }

  location @pwa_index {
    rewrite ^ /index.html break;
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/mobile/";
    try_files /sw.js =404;
  }

  location /_expo/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
  }
}
