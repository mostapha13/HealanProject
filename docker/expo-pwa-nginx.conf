server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  charset utf-8;
  # Keep redirects relative so gateway HTTPS is not downgraded to http://
  absolute_redirect off;
  port_in_redirect off;

  location = /mobile {
    return 302 /mobile/;
  }

  # Strip /mobile prefix; SPA fallback via named location (never hit location /)
  location /mobile/ {
    rewrite ^/mobile/(.*)$ /$1 break;
    # Avoid $uri/ + index → internal redirect to /index.html → location / → loop
    try_files $uri @pwa_spa;
  }

  location @pwa_spa {
    rewrite ^ /index.html break;
  }

  location /_expo/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/mobile/";
    try_files /sw.js =404;
  }

  location / {
    return 302 /mobile/;
  }
}
