server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  charset utf-8;
  absolute_redirect off;
  port_in_redirect off;

  # /mobile → /mobile/
  location = /mobile {
    return 302 /mobile/;
  }

  # Re-dispatch /mobile/foo → /foo (flag "last" re-enters location /)
  location ^~ /mobile/ {
    rewrite ^/mobile/?(.*)$ /$1 last;
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/mobile/";
    try_files /sw.js =404;
  }

  location /_expo/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
  }

  # Default SPA — never redirect back to /mobile/
  location / {
    try_files $uri /index.html;
  }
}
