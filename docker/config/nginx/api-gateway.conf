upstream healan_api_upstream {
  server healan-webapi:8080;
}

upstream usermanager_api_upstream {
  server identity-usermanager:8080;
}

upstream filemanager_api_upstream {
  server filemanager-webui:8080;
}

server {
  listen 80;
  server_name _;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # No path on proxy_pass — keep full /Healan/... URI (avoids empty 404)
  location /Healan/ {
    proxy_pass http://healan_api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /UserManager/ {
    proxy_pass http://usermanager_api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /File/ {
    proxy_pass http://filemanager_api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;
  }

  location / {
    return 404;
  }
}
