# Docker DNS — re-resolve after container recreate (avoid stale upstream IPs → 404/502)
resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 80;
  server_name _;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # No path on proxy_pass — keep full /Healan/... URI (avoids empty 404)
  location /Healan/ {
    set $healan_api "healan-webapi:8080";
    proxy_pass http://$healan_api$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 10m;
    proxy_connect_timeout 30s;
    proxy_send_timeout 200s;
    proxy_read_timeout 200s;
  }

  location /UserManager/ {
    set $usermanager_api "identity-usermanager:8080";
    proxy_pass http://$usermanager_api$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /File/ {
    set $filemanager_api "filemanager-webui:8080";
    proxy_pass http://$filemanager_api$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;
  }

  location / {
    return 404;
  }
}
