# بعد از صدور گواهی SSL این فایل را mount کنید (راهنما: docker/scripts/setup-ssl.sh)
# IMPORTANT: use variable proxy_pass + Docker DNS so recreate of backends
# does not leave nginx stuck on a stale container IP (old UI / 502).

# Docker embedded DNS — re-resolve after container recreate
resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 443 ssl http2;
  server_name drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name portal.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name www.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    set $portal_upstream "healan-portal:80";
    proxy_pass http://$portal_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /Healan/ {
    set $healan_api "healan-webapi:8080";
    proxy_pass http://$healan_api$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /File/ {
    set $api_gw "api-gateway:80";
    proxy_pass http://$api_gw$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 25m;
  }
}

