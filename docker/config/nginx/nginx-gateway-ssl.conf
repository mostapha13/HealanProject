# بعد از صدور گواهی SSL این فایل را mount کنید (راهنما: docker/scripts/setup-ssl.sh)

upstream healan_clinic_upstream {
  server healan-clinic:80;
}

upstream healan_portal_upstream {
  server healan-portal:80;
}

upstream login_upstream {
  server healan-login:80;
}

upstream api_gateway_upstream {
  server api-gateway:80;
}

upstream identity_server_upstream {
  server identity-server:8080;
}

upstream captcha_upstream {
  server captcha-webui:8080;
}

server {
  listen 443 ssl http2;
  server_name drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name portal.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name www.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    proxy_pass http://healan_portal_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /Healan/ {
    proxy_pass http://api_gateway_upstream/Healan/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /File/ {
    proxy_pass http://api_gateway_upstream/File/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 25m;
  }
}

server {
  listen 443 ssl http2;
  server_name clinic.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    proxy_pass http://healan_clinic_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /Healan/ {
    proxy_pass http://api_gateway_upstream/Healan/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /UserManager/ {
    proxy_pass http://api_gateway_upstream/UserManager/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /File/ {
    proxy_pass http://api_gateway_upstream/File/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 25m;
  }
}

server {
  listen 443 ssl http2;
  server_name auth.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location /connect/ {
    proxy_pass http://identity_server_upstream/connect/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /.well-known/ {
    proxy_pass http://identity_server_upstream/.well-known/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /Account/ {
    proxy_pass http://identity_server_upstream/Account/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /CaptchaProvider/ {
    proxy_pass http://captcha_upstream/CaptchaProvider/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /UserManager/ {
    proxy_pass http://api_gateway_upstream/UserManager/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    proxy_pass http://login_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
