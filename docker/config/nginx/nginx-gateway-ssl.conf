server {
  listen 443 ssl http2;
  server_name auth.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location /connect/ {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /.well-known/ {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /Account/ {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /CaptchaProvider/ {
    set $captcha_upstream "captcha-webui:8080";
    proxy_pass http://$captcha_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /SMSProvider/ {
    set $sms_upstream "smsprovider-webapp:8080";
    proxy_pass http://$sms_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /UserManager/ {
    set $usermanager_api "identity-usermanager:8080";
    proxy_pass http://$usermanager_api$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location = / {
    return 302 https://clinic.drshahrooei.ir/;
  }

  location / {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
