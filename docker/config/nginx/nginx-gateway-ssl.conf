    proxy_set_header X-Forwarded-Proto https;
  }

  location = / {
    return 302 https://clinic.drshahrooei.ir/;
  }

  location / {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream$request_uri;
