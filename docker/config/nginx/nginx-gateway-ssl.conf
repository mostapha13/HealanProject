# بعد از صدور گواهی SSL این فایل را mount کنید (راهنما: docker/scripts/setup-ssl.sh)
# IMPORTANT: use variable proxy_pass + Docker DNS so recreate of backends
# does not leave nginx stuck on a stale container IP (old UI / 502).
# resolver در nginx-gateway.conf (default.conf) تعریف شده — اینجا تکرار نکن.

server {
  listen 443 ssl http2;
  server_name drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name portal.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name www.drshahrooei.ir;

  ssl_certificate /etc/letsencrypt/live/drshahrooei.ir/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/drshahrooei.ir/privkey.pem;

  # Next.js marketing (landing + blog) — SEO SSR
  # Use exact /blog + /blog/… so paths like /blogging never match.
  location = / {
    set $www_upstream "healan-www:3000";
    proxy_pass http://$www_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location = /blog {
    set $www_upstream "healan-www:3000";
    proxy_pass http://$www_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ^~ /blog/ {
    set $www_upstream "healan-www:3000";
    proxy_pass http://$www_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ^~ /_next/ {
    set $www_upstream "healan-www:3000";
    proxy_pass http://$www_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location = /robots.txt {
    set $www_upstream "healan-www:3000";
    proxy_pass http://$www_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  location = /sitemap.xml {
    set $www_upstream "healan-www:3000";
    proxy_pass http://$www_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  # SPA app routes (assistant / booking / patient) + static assets
  location / {
    set $portal_upstream "healan-portal:80";
    proxy_pass http://$portal_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /Healan/ {
    set $healan_api "healan-webapi:8080";
    proxy_pass http://$healan_api$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    # Whisper STT (first model load / CPU) can exceed nginx default 60s
    client_max_body_size 10m;
    proxy_connect_timeout 30s;
    proxy_send_timeout 200s;
    proxy_read_timeout 200s;
  }

  location /File/ {
    set $api_gw "api-gateway:80";
    proxy_pass http://$api_gw$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 25m;
  }
}

