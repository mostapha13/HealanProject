upstream healan_clinic_upstream {
  server healan-clinic:80;
}

upstream healan_portal_upstream {
  server healan-portal:80;
}

upstream login_upstream {
  server healan-login:80;
}

upstream api_gateway_upstream {
  server api-gateway:80;
}

upstream healan_api_upstream {
  server healan-webapi:8080;
}

upstream identity_server_upstream {
  server identity-server:8080;
}

upstream captcha_upstream {
  server captcha-webui:8080;
}

# Docker embedded DNS — re-resolve after container recreate
# (static upstream hostnames are cached at nginx start → stale IP → wrong backend)
resolver 127.0.0.11 valid=10s ipv6=off;

# --- redirect: drshahrooei.ir → www ---
server {
  listen 80;
  server_name drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 http://www.drshahrooei.ir$request_uri;
  }
}

# --- redirect: portal → www ---
server {
  listen 80;
  server_name portal.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 http://www.drshahrooei.ir$request_uri;
  }
}

# --- سایت اصلی (canonical): www ---
server {
  listen 80;
  server_name www.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass http://healan_portal_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Direct to webapi (avoid api-gateway path rewrite 404)
  location /Healan/ {
    proxy_pass http://healan_api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /File/ {
    proxy_pass http://api_gateway_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;
  }
}

# --- پنل کلینیک ---
server {
  listen 80;
  server_name clinic.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass http://healan_clinic_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /Healan/ {
    set $healan_api "healan-webapi:8080";
    proxy_pass http://$healan_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /UserManager/ {
    set $api_gw "api-gateway:80";
    proxy_pass http://$api_gw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /File/ {
    set $api_gw "api-gateway:80";
    proxy_pass http://$api_gw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;
  }
}

# --- صفحه ورود + Identity OAuth ---
server {
  listen 80;
  server_name auth.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Dynamic resolve — stale upstream IP was sending Login to Healan AccessMiddleware (401 JSON)
  location /connect/ {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /.well-known/ {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /Account/ {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /CaptchaProvider/ {
    set $captcha_upstream "captcha-webui:8080";
    proxy_pass http://$captcha_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /UserManager/ {
    set $api_gw "api-gateway:80";
    proxy_pass http://$api_gw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Show Identity login form directly (do not bounce auth root → clinic)
  location = / {
    return 302 /Account/Login;
  }

  location / {
    set $identity_upstream "identity-server:8080";
    proxy_pass http://$identity_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- پیش‌فرض → www ---
server {
  listen 80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location / {
    return 301 http://www.drshahrooei.ir$request_uri;
  }
}
