# Docker embedded DNS — re-resolve after container recreate
# (static upstream hostnames are cached at nginx start → stale IP → wrong backend)
# HTTPS proxyها در nginx-gateway-ssl.conf با variable + همین resolver کار می‌کنند.
resolver 127.0.0.11 valid=10s ipv6=off;

# --- HTTP: فقط ACME + ریدایرکت به HTTPS ---

# apex → https://www
server {
  listen 80;
  server_name drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

# portal → https://www
server {
  listen 80;
  server_name portal.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

# www → https://www (مثلاً /assistant)
server {
  listen 80;
  server_name www.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}

# clinic → https://clinic
server {
  listen 80;
  server_name clinic.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://clinic.drshahrooei.ir$request_uri;
  }
}

# auth → https://auth
server {
  listen 80;
  server_name auth.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://auth.drshahrooei.ir$request_uri;
  }
}

# پیش‌فرض → https://www
server {
  listen 80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location / {
    return 301 https://www.drshahrooei.ir$request_uri;
  }
}
