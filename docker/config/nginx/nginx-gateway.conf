# --- صفحه ورود + Identity OAuth ---
server {
  listen 80;
  server_name auth.drshahrooei.ir;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /connect/ {
    proxy_pass http://identity_server_upstream/connect/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /.well-known/ {
    proxy_pass http://identity_server_upstream/.well-known/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /Account/ {
    proxy_pass http://identity_server_upstream/Account/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /CaptchaProvider/ {
    proxy_pass http://captcha_upstream/CaptchaProvider/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /UserManager/ {
    proxy_pass http://api_gateway_upstream/UserManager/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://login_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- پیش‌فرض → www ---
server {
  listen 80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location / {
    return 301 http://www.drshahrooei.ir$request_uri;
  }
}
