services:
  api-gateway:
    image: nginx:1.27-alpine
    container_name: healan-api-gateway
    depends_on:
      - healan-webapi
      - identity-usermanager
      - filemanager-webui
    expose:
      - "80"
    volumes:
      - ./docker/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro

  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: healan-nginx-gateway
    depends_on:
      - api-gateway
      - healan-clinic
      - healan-portal
      - healan-webapi
      - identity-usermanager
      - filemanager-webui
      - login
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healan-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: healan-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: healan-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  identity-grpc:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/IdentityProvider/src/IdentityServer.GrpcServer/IdentityServer.GrpcServer.csproj
        DLL_NAME: IdentityServer.GrpcServer.dll
    container_name: healan-identity-grpc
    ports:
      - "6829:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Identity;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      Redis__Hosts__0__Host: redis
      Redis__Hosts__0__Port: "6379"

  identity-server:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/IdentityProvider/src/IdentityServer/IdentityServer.csproj
        DLL_NAME: IdentityServer.dll
    container_name: healan-identity-server
    ports:
      - "5005:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      identity-grpc:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Identity;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      GrpcServer__IdentityServer: "http://identity-grpc:8080"
      Redis__Hosts__0__Host: redis
      Redis__Hosts__0__Port: "6379"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"

  identity-usermanager:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/IdentityProvider/src/IdentityServer.UserManagerAPI/IdentityServer.UserManagerAPI.csproj
        DLL_NAME: IdentityServer.UserManagerAPI.dll
    container_name: healan-identity-usermanager
    ports:
      - "5074:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      identity-grpc:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Identity;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      GrpcServer__IdentityServer: "http://identity-grpc:8080"
      IdentityServer__Url: "http://identity-server:8080/"
      Redis__Hosts__0__Host: redis
      Redis__Hosts__0__Port: "6379"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"

  filemanager-grpc:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/FileManager/src/FileManager.GrpcServer/FileManager.GrpcServer.csproj
        DLL_NAME: FileManager.GrpcServer.dll
    container_name: healan-filemanager-grpc
    ports:
      - "5060:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Filemanager;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"

  filemanager-webui:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/FileManager/src/FileManager.WebUI/FileManager.WebUI.csproj
        DLL_NAME: FileManager.WebUI.dll
    container_name: healan-filemanager-webui
    ports:
      - "6823:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      filemanager-grpc:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Filemanager;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      ApiGateway__Url: "http://filemanager-webui:8080"
      IdentityServer__Url: "http://identity-server:8080/"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
    volumes:
      - filemanager_attachments:/app/Attachment

  workflow-webui:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/WorkFlow/src/WorkFlow.WebUI/WorkFlow.WebUI.csproj
        DLL_NAME: WorkFlow.WebUI.dll
    container_name: healan-workflow-webui
    ports:
      - "6022:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      filemanager-grpc:
        condition: service_started
      identity-grpc:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Workflow;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      GrpcServer__IdentityServer: "http://identity-grpc:8080"
      GrpcServer__FileManager: "http://filemanager-grpc:8080"
      FileManagerBaseUrl: "http://filemanager-webui:8080/File"
      IdentityServer__Url: "http://identity-server:8080/"
      Redis__Hosts__0__Host: redis
      Redis__Hosts__0__Port: "6379"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"

  captcha-webui:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/CaptchaProvider/CaptchaProvider.WebUI/CaptchaProvider.WebUI.csproj
        DLL_NAME: CaptchaProvider.WebUI.dll
    container_name: healan-captcha-webui
    ports:
      - "6026:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Captcha;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"

  notification-webapp:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/Notification/Notification.WebApp/Notification.WebApp.csproj
        DLL_NAME: Notification.WebApp.dll
    container_name: healan-notification-webapp
    ports:
      - "6030:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan-Notification;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"

  healan-webapi:
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/Healan/src/Healan.WebApi/Healan.WebApi.csproj
        DLL_NAME: Healan.WebApi.dll
    container_name: healan-webapi
    ports:
      - "6128:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      identity-grpc:
        condition: service_started
      filemanager-grpc:
        condition: service_started
      workflow-webui:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Healan;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      GrpcServer__IdentityServer: "http://identity-grpc:8080"
      GrpcServer__FileManager: "http://filemanager-grpc:8080"
      WorkFlowBaseUrl: "http://workflow-webui:8080/"
      IdentityServer__Url: "http://identity-server:8080/"
      Redis__Hosts__0__Host: redis
      Redis__Hosts__0__Port: "6379"

  healan-clinic:
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: healan-clinic
    container_name: healan-clinic
    expose:
      - "80"
    depends_on:
      - healan-webapi
      - identity-usermanager
      - filemanager-webui

  healan-portal:
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: healan-portal
    container_name: healan-portal
    expose:
      - "80"
    depends_on:
      - healan-webapi
      - filemanager-webui

  login:
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: login
    container_name: healan-login
    expose:
      - "80"
    depends_on:
      - identity-server
      - identity-usermanager

  cash-market:
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: cash-market
    container_name: healan-cash-market
    ports:
      - "4203:80"

  regions-hall:
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: regions-hall
    container_name: healan-regions-hall
    ports:
      - "4204:80"

  modern-instrumentations:
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: modern-instrumentations
    container_name: healan-modern-instrumentations
    ports:
      - "4205:80"

  tax-front:
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: tax-front
    container_name: healan-tax-front
    ports:
      - "4206:80"

volumes:
  sqlserver_data:
  filemanager_attachments:
