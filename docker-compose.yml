services:
  api-gateway:
    restart: unless-stopped
    image: nginx:1.27-alpine
    container_name: healan-api-gateway
    depends_on:
      - healan-webapi
      - identity-usermanager
      - filemanager-webui
    expose:
      - "80"
    volumes:
      - ./docker/config/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro

  nginx-gateway:
    restart: unless-stopped
    image: nginx:1.27-alpine
    container_name: healan-nginx-gateway
    depends_on:
      - api-gateway
      - healan-clinic
      - healan-portal
      - healan-www
      - healan-webapi
      - identity-usermanager
      - filemanager-webui
      - login
      - python-rag
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/config/nginx/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/config/certbot/www:/var/www/certbot:ro
      # بعد از setup-ssl.sh این خط را از کامنت درآورید:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - ./docker/config/nginx/nginx-gateway-ssl.conf:/etc/nginx/conf.d/ssl.conf:ro

  sqlserver:
    restart: unless-stopped
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healan-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    container_name: healan-redis
    ports:
      - "6379:6379"

  rabbitmq:
    restart: unless-stopped
    image: rabbitmq:3-management
    container_name: healan-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  identity-grpc:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/IdentityProvider/src/IdentityServer.GrpcServer/IdentityServer.GrpcServer.csproj
        DLL_NAME: IdentityServer.GrpcServer.dll
    container_name: healan-identity-grpc
    ports:
      - "6829:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/identity-grpc/appsettings.Production.json:/app/appsettings.Production.json:ro

  identity-server:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/IdentityProvider/src/IdentityServer/IdentityServer.csproj
        DLL_NAME: IdentityServer.dll
    container_name: healan-identity-server
    ports:
      - "5005:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      identity-grpc:
        condition: service_started
      captcha-webui:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/identity-server/appsettings.Production.json:/app/appsettings.Production.json:ro

  identity-usermanager:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/IdentityProvider/src/IdentityServer.UserManagerAPI/IdentityServer.UserManagerAPI.csproj
        DLL_NAME: IdentityServer.UserManagerAPI.dll
    container_name: healan-identity-usermanager
    ports:
      - "5074:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      identity-grpc:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/identity-usermanager/appsettings.Production.json:/app/appsettings.Production.json:ro

  filemanager-grpc:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/FileManager/src/FileManager.GrpcServer/FileManager.GrpcServer.csproj
        DLL_NAME: FileManager.GrpcServer.dll
    container_name: healan-filemanager-grpc
    ports:
      - "5060:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/filemanager-grpc/appsettings.Production.json:/app/appsettings.Production.json:ro
      - ./docker/data/filemanager-attachments:/app/Attachment

  filemanager-webui:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/FileManager/src/FileManager.WebUI/FileManager.WebUI.csproj
        DLL_NAME: FileManager.WebUI.dll
    container_name: healan-filemanager-webui
    ports:
      - "6823:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      filemanager-grpc:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/filemanager-webui/appsettings.Production.json:/app/appsettings.Production.json:ro
      - ./docker/data/filemanager-attachments:/app/Attachment

  workflow-webui:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/WorkFlow/src/WorkFlow.WebUI/WorkFlow.WebUI.csproj
        DLL_NAME: WorkFlow.WebUI.dll
    container_name: healan-workflow-webui
    ports:
      - "6022:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      filemanager-grpc:
        condition: service_started
      identity-grpc:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/workflow-webui/appsettings.Production.json:/app/appsettings.Production.json:ro

  captcha-webui:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/CaptchaProvider/CaptchaProvider.WebUI/CaptchaProvider.WebUI.csproj
        DLL_NAME: CaptchaProvider.WebUI.dll
    container_name: healan-captcha-webui
    ports:
      - "6026:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/captcha-webui/appsettings.Production.json:/app/appsettings.Production.json:ro

  notification-webapp:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/Notification/Notification.WebApp/Notification.WebApp.csproj
        DLL_NAME: Notification.WebApp.dll
    container_name: healan-notification-webapp
    ports:
      - "6030:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/notification-webapp/appsettings.Production.json:/app/appsettings.Production.json:ro

  smsprovider-webapp:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/SMSProvider/SMSProvider.WebApp/SMSProvider.WebApp.csproj
        DLL_NAME: SMSProvider.WebApp.dll
    container_name: healan-smsprovider-webapp
    ports:
      - "6032:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/smsprovider-webapp/appsettings.Production.json:/app/appsettings.Production.json:ro

  python-rag:
    build:
      context: .
      dockerfile: docker/python-rag.Dockerfile
    container_name: healan-python-rag
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
    env_file:
      - ./docker/config/python/rag.env
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
      HOST: "0.0.0.0"
      PORT: "8000"
      DATA_SOURCE: "sqlserver"
      SQL_SERVER_USE_HEALAN_BUNDLE: "true"
      EMBEDDING_MODEL: "heydariAI/persian-embeddings"
      CHROMA_PERSIST_DIR: "/data/chroma"
      CHROMA_COLLECTION: "healan_rag"
      RAG_AUTO_INGEST: "true"
      RAG_TOP_K: "5"
      RAG_ANSWER_MODE: "direct"
      RAG_SIMILARITY_THRESHOLD: "0.55"
      RAG_SYNC_ENABLED: "true"
      RAG_SYNC_INTERVAL_MINUTES: "10"
      RAG_SUMMARIZE_ENABLED: "true"
      RAG_SUMMARIZE_MODEL: "qwen2.5:3b"
      OPENAI_API_KEY: "ollama"
      OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
      OPENAI_MODEL: "qwen2.5:3b"
      STT_ENABLED: "true"
      STT_MODEL: "small"
      STT_DEVICE: "cpu"
      STT_COMPUTE_TYPE: "int8"
      STT_LANGUAGE: "fa"
      HF_HOME: "/data/hf-cache"
      TRANSFORMERS_CACHE: "/data/hf-cache"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - python_rag_chroma:/data/chroma
      - python_rag_hf:/data/hf-cache
    restart: unless-stopped

  healan-webapi:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/dotnet-service.Dockerfile
      args:
        PROJECT_PATH: Backend/Healan/src/Healan.WebApi/Healan.WebApi.csproj
        DLL_NAME: Healan.WebApi.dll
    container_name: healan-webapi
    ports:
      - "6128:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      identity-grpc:
        condition: service_started
      filemanager-grpc:
        condition: service_started
      workflow-webui:
        condition: service_started
      python-rag:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ./docker/config/healan-webapi/appsettings.Production.json:/app/appsettings.Production.json:ro

  healan-clinic:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: healan-clinic
    container_name: healan-clinic
    expose:
      - "80"
    depends_on:
      - healan-webapi
      - identity-usermanager
      - filemanager-webui

  healan-portal:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: healan-portal
    container_name: healan-portal
    expose:
      - "80"
    depends_on:
      - healan-webapi
      - filemanager-webui

  # Public marketing site (landing + blog) — SSR/ISR for SEO
  healan-www:
    restart: unless-stopped
    build:
      context: ./Frontend/healan-www
      dockerfile: Dockerfile
    container_name: healan-www
    expose:
      - "3000"
    environment:
      HEALAN_API_INTERNAL_URL: http://healan-webapi:8080/Healan/api/v1/
      NEXT_PUBLIC_SITE_URL: https://www.drshahrooei.ir
      NEXT_PUBLIC_HEALAN_API_URL: /Healan/api/v1/
    depends_on:
      - healan-webapi
      - filemanager-webui

  login:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/frontend-nx.Dockerfile
      args:
        APP_NAME: login
    container_name: healan-login
    expose:
      - "80"
    depends_on:
      - identity-server
      - identity-usermanager

volumes:
  sqlserver_data:
  python_rag_chroma:
  python_rag_hf:
